<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校內數獨比賽(初賽)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #F8FAFC;
            user-select: none;
            touch-action: manipulation;
            overflow-x: hidden;
        }
        
        /* 核心盤面容器：確保在平板上高度不會溢出 */
        .game-wrapper {
            width: 100%;
            max-width: 600px; /* 限制最大寬度，避免在超大平板上太散 */
            margin: 0 auto;
        }

        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            border: 3px solid #0F172A;
            background-color: #0F172A;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        .sudoku-cell {
            aspect-ratio: 1 / 1;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: background-color 0.1s;
        }

        .sudoku-cell.selected {
            background-color: #E0E7FF;
            box-shadow: inset 0 0 0 2px #6366F1;
            z-index: 10;
        }

        .sudoku-cell.highlightValue {
            background-color: #F1F5F9;
        }
        
        /* 線條精細化：在平板上 3px 的粗度已足夠清晰 */
        .border-r-bold { border-right: 3px solid #0F172A; }
        .border-r-thin { border-right: 1px solid #E2E8F0; }
        .border-b-bold { border-bottom: 3px solid #0F172A; }
        .border-b-thin { border-bottom: 1px solid #E2E8F0; }
        
        .number-btn {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation;
        }
        .number-btn:active { 
            transform: scale(0.92);
            background-color: #F1F5F9;
        }
        
        .note-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 100%;
            height: 100%;
            padding: 10%;
        }
        .note-num {
            font-size: clamp(8px, 1.2vw, 12px);
            color: #94A3B8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            line-height: 1;
        }

        /* 針對橫向模式或矮螢幕平板優化 */
        @media (max-height: 700px) {
            .header-section { margin-bottom: 1rem; }
            .status-bar { padding: 0.75rem; margin-bottom: 1rem; }
            .sudoku-cell span { font-size: 1.5rem; }
        }
    </style>
</head>
<body class="p-4 md:p-6 flex flex-col items-center min-h-screen">

    <!-- 標題區域：縮小一點以騰出空間 -->
    <div class="header-section w-full max-w-[600px] mb-4 text-center">
        <h1 class="text-2xl md:text-3xl font-black tracking-tight text-[#0F172A] flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="text-indigo-600 w-6 h-6 md:w-8 md:h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            校內數獨比賽(初賽)
        </h1>
        <div class="h-1 w-16 bg-indigo-600 mx-auto mt-1 rounded-full"></div>
    </div>

    <!-- 狀態與計時器：更緊湊的設計 -->
    <div id="status-bar" class="status-bar w-full max-w-[600px] bg-white rounded-2xl border-2 border-slate-200 p-3 md:p-4 mb-4 flex justify-between items-center px-6">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-indigo-50 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-500"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <span id="timer-display" class="text-2xl md:text-3xl font-mono font-black text-slate-700">00:00</span>
        </div>
        <div class="text-right">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block leading-none">Status</span>
            <p class="text-indigo-600 font-bold text-sm">進行中</p>
        </div>
    </div>

    <!-- 遊戲盤面容器：限制最大寬度為 600px -->
    <div class="game-wrapper">
        <div id="game-board" class="sudoku-grid relative rounded-sm overflow-hidden">
            <!-- JS 動態生成 -->
        </div>
    </div>

    <!-- 控制區：針對點擊舒適度微調 -->
    <div id="controls" class="w-full max-w-[600px] mt-6 space-y-4">
        <div class="grid grid-cols-5 gap-2 md:gap-3">
            <!-- 數字按鈕 1-9 -->
            <button onclick="inputNumber(1)" class="number-btn aspect-square bg-white border-2 border-slate-200 rounded-xl text-2xl md:text-3xl font-black text-slate-700 shadow-sm flex items-center justify-center">1</button>
            <button onclick="inputNumber(2)" class="number-btn aspect-square bg-white border-2 border-slate-200 rounded-xl text-2xl md:text-3xl font-black text-slate-700 shadow-sm flex items-center justify-center">2</button>
            <button onclick="inputNumber(3)" class="number-btn aspect-square bg-white border-2 border-slate-200 rounded-xl text-2xl md:text-3xl font-black text-slate-700 shadow-sm flex items-center justify-center">3</button>
            <button onclick="inputNumber(4)" class="number-btn aspect-square bg-white border-2 border-slate-200 rounded-xl text-2xl md:text-3xl font-black text-slate-700 shadow-sm flex items-center justify-center">4</button>
            <button onclick="inputNumber(5)" class="number-btn aspect-square bg-white border-2 border-slate-200 rounded-xl text-2xl md:text-3xl font-black text-slate-700 shadow-sm flex items-center justify-center">5</button>
            <button onclick="inputNumber(6)" class="number-btn aspect-square bg-white border-2 border-slate-200 rounded-xl text-2xl md:text-3xl font-black text-slate-700 shadow-sm flex items-center justify-center">6</button>
            <button onclick="inputNumber(7)" class="number-btn aspect-square bg-white border-2 border-slate-200 rounded-xl text-2xl md:text-3xl font-black text-slate-700 shadow-sm flex items-center justify-center">7</button>
            <button onclick="inputNumber(8)" class="number-btn aspect-square bg-white border-2 border-slate-200 rounded-xl text-2xl md:text-3xl font-black text-slate-700 shadow-sm flex items-center justify-center">8</button>
            <button onclick="inputNumber(9)" class="number-btn aspect-square bg-white border-2 border-slate-200 rounded-xl text-2xl md:text-3xl font-black text-slate-700 shadow-sm flex items-center justify-center">9</button>
            
            <!-- 筆記開關 -->
            <button id="note-toggle" onclick="toggleNoteMode()" class="aspect-square rounded-xl border-2 bg-white border-slate-200 text-slate-400 flex flex-col items-center justify-center transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 md:w-8 md:h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                <span class="text-[9px] font-bold mt-1">筆記</span>
            </button>
        </div>

        <!-- 提交按鈕：橫向平板下寬度適中 -->
        <button onclick="showConfirmModal()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 md:py-5 rounded-xl shadow-lg flex items-center justify-center gap-2 transition-all text-lg md:text-xl">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
            提交結果
        </button>
    </div>

    <!-- 彈窗系統 (同前，但樣式微調更符合平板) -->
    <div id="overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-6">
        <div id="modal-confirm" class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl hidden">
            <h3 class="text-xl font-black text-center mb-6 text-slate-800">確定完成並交卷？</h3>
            <div class="flex flex-col gap-3">
                <button onclick="finishGame()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl text-lg">確定交卷</button>
                <button onclick="hideOverlay()" class="w-full bg-slate-100 text-slate-500 font-bold py-4 rounded-xl">返回檢查</button>
            </div>
        </div>

        <div id="modal-info" class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl hidden text-center">
            <h2 class="text-2xl font-black text-slate-800 mb-6">挑戰成功！請填寫資料</h2>
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-[10px] font-black text-slate-400 mb-1 block uppercase tracking-widest">姓名 Name</label>
                    <input id="input-name" type="text" placeholder="參賽者姓名" class="w-full bg-slate-50 border-2 border-slate-200 p-4 rounded-xl font-bold outline-none focus:border-indigo-500 transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 mb-1 block uppercase tracking-widest">班級 Class</label>
                        <select id="select-class" class="w-full bg-slate-50 border-2 border-slate-200 p-4 rounded-xl font-bold appearance-none outline-none focus:border-indigo-500 text-center"></select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 mb-1 block uppercase tracking-widest">座號 No.</label>
                        <select id="select-id" class="w-full bg-slate-50 border-2 border-slate-200 p-4 rounded-xl font-bold appearance-none outline-none focus:border-indigo-500 text-center"></select>
                    </div>
                </div>
                <button onclick="submitResults()" id="btn-submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl text-lg mt-4 shadow-lg">確認上傳成績</button>
            </div>
        </div>

        <div id="modal-success" class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl hidden text-center">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-6">提交成功！</h2>
            <div class="bg-slate-50 p-6 rounded-2xl border-2 border-slate-100 mb-6">
                <div class="grid grid-cols-2 gap-4 mb-4 text-left border-b border-slate-200 pb-4">
                    <div>
                        <p class="text-[10px] text-slate-400 font-black uppercase">用時</p>
                        <p id="final-time" class="text-lg font-black text-slate-700">00:00</p>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 font-black uppercase">錯誤</p>
                        <p id="final-mistakes" class="text-lg font-black text-red-500">0</p>
                    </div>
                </div>
                <p id="final-score" class="text-6xl font-black text-indigo-600 tracking-tighter">0</p>
                <p class="text-[10px] text-slate-400 font-black uppercase mt-1">最終積分</p>
            </div>
            <button onclick="location.reload()" class="text-indigo-600 font-bold hover:underline">重新開始</button>
        </div>

        <div id="modal-loading" class="hidden flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-white/30 border-t-white mb-4"></div>
            <p class="font-bold text-white">上傳數據中...</p>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyB2ztD54JZ0yiLIPV3ydhZgz0kuvppUmWq79l0X2je1cv83_621H9L5b5xtxxKiUatKA/exec";

        const SOLUTION = [
            [5, 3, 4, 6, 7, 8, 9, 1, 2], [6, 7, 2, 1, 9, 5, 3, 4, 8], [1, 9, 8, 3, 4, 2, 5, 6, 7],
            [8, 5, 9, 7, 6, 1, 4, 2, 3], [4, 2, 6, 8, 5, 3, 7, 9, 1], [7, 1, 3, 9, 2, 4, 8, 5, 6],
            [9, 6, 1, 5, 3, 7, 2, 8, 4], [2, 8, 7, 4, 1, 9, 6, 3, 5], [3, 4, 5, 2, 8, 6, 1, 7, 9]
        ];

        const INITIAL_GRID = [
            [5, 3, 0, 0, 7, 0, 0, 1, 2], [6, 0, 0, 1, 9, 5, 0, 4, 8], [1, 9, 8, 0, 0, 0, 5, 6, 0],
            [8, 5, 9, 7, 6, 1, 0, 2, 3], [4, 2, 6, 8, 5, 3, 7, 9, 1], [7, 1, 3, 9, 2, 4, 8, 5, 6],
            [9, 6, 0, 5, 3, 7, 0, 0, 4], [0, 8, 7, 4, 1, 9, 6, 3, 5], [3, 4, 5, 2, 8, 6, 1, 7, 0]
        ];

        let grid = JSON.parse(JSON.stringify(INITIAL_GRID));
        let notes = Array(9).fill().map(() => Array(9).fill().map(() => []));
        let selectedCell = [null, null];
        let isNoteMode = false;
        let timer = 0;
        let timerInterval = null;
        let gameStatus = 'playing';

        function init() {
            renderBoard();
            initSelects();
            startTimer();
        }

        function initSelects() {
            const classSelect = document.getElementById('select-class');
            const idSelect = document.getElementById('select-id');
            for (let g = 1; g <= 6; g++) {
                ['A', 'B', 'C', 'D'].forEach(l => {
                    const opt = document.createElement('option');
                    opt.value = `${g}${l}`; opt.textContent = `${g}${l}`;
                    classSelect.appendChild(opt);
                });
            }
            for (let i = 1; i <= 45; i++) {
                const opt = document.createElement('option');
                opt.value = i; opt.textContent = i.toString().padStart(2, '0');
                idSelect.appendChild(opt);
            }
        }

        function renderBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const cellValue = grid[r][c];
                    const isOriginal = INITIAL_GRID[r][c] !== 0;
                    const isSelected = selectedCell[0] === r && selectedCell[1] === c;
                    const selValue = selectedCell[0] !== null ? grid[selectedCell[0]][selectedCell[1]] : null;
                    const isSameValue = selValue !== 0 && cellValue === selValue;

                    const div = document.createElement('div');
                    div.className = `sudoku-cell ${isSelected ? 'selected' : (isSameValue ? 'highlightValue' : '')}`;
                    
                    if ((c + 1) % 3 === 0 && c < 8) div.classList.add('border-r-bold');
                    else if (c < 8) div.classList.add('border-r-thin');
                    if ((r + 1) % 3 === 0 && r < 8) div.classList.add('border-b-bold');
                    else if (r < 8) div.classList.add('border-b-thin');

                    if (cellValue !== 0) {
                        const span = document.createElement('span');
                        span.className = `text-2xl md:text-4xl font-black ${isOriginal ? 'text-slate-900' : 'text-indigo-600'}`;
                        span.textContent = cellValue;
                        div.appendChild(span);
                    } else {
                        const noteGrid = document.createElement('div');
                        noteGrid.className = 'note-grid';
                        for (let n = 1; n <= 9; n++) {
                            const nDiv = document.createElement('div');
                            nDiv.className = 'note-num';
                            if (notes[r][c].includes(n)) nDiv.textContent = n;
                            noteGrid.appendChild(nDiv);
                        }
                        div.appendChild(noteGrid);
                    }
                    div.onclick = () => { if(gameStatus==='playing'){ selectedCell=[r,c]; renderBoard(); }};
                    board.appendChild(div);
                }
            }
        }

        function inputNumber(num) {
            if (gameStatus !== 'playing' || selectedCell[0] === null) return;
            const [r, c] = selectedCell;
            if (INITIAL_GRID[r][c] !== 0) return;
            if (isNoteMode) {
                notes[r][c] = notes[r][c].includes(num) ? notes[r][c].filter(n => n !== num) : [...notes[r][c], num].sort();
            } else {
                grid[r][c] = grid[r][c] === num ? 0 : num;
            }
            renderBoard();
        }

        function toggleNoteMode() {
            isNoteMode = !isNoteMode;
            const btn = document.getElementById('note-toggle');
            btn.classList.toggle('bg-amber-500', isNoteMode);
            btn.classList.toggle('text-white', isNoteMode);
            btn.classList.toggle('border-amber-600', isNoteMode);
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timer++;
                document.getElementById('timer-display').textContent = formatTime(timer);
            }, 1000);
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function showConfirmModal() {
            document.getElementById('overlay').classList.remove('hidden');
            document.getElementById('modal-confirm').classList.remove('hidden');
        }

        function hideOverlay() {
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('modal-confirm').classList.add('hidden');
            document.getElementById('modal-info').classList.add('hidden');
        }

        function finishGame() {
            clearInterval(timerInterval);
            gameStatus = 'finished';
            document.getElementById('modal-confirm').classList.add('hidden');
            document.getElementById('modal-info').classList.remove('hidden');
        }

        async function submitResults() {
            const name = document.getElementById('input-name').value.trim();
            if (!name) return document.getElementById('input-name').classList.add('border-red-500');

            let mistakes = 0;
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (INITIAL_GRID[r][c] === 0 && grid[r][c] !== SOLUTION[r][c]) mistakes++;
                }
            }
            const score = Math.round(Math.max(0, 4000 - (timer * 1.5) - (mistakes * 120)));

            document.getElementById('modal-info').classList.add('hidden');
            document.getElementById('modal-loading').classList.remove('hidden');

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        timestamp: new Date().toLocaleString(),
                        name: name,
                        className: document.getElementById('select-class').value,
                        studentId: document.getElementById('select-id').value,
                        score: score,
                        timeUsed: formatTime(timer),
                        mistakes: mistakes
                    })
                });
            } catch (e) {}

            document.getElementById('modal-loading').classList.add('hidden');
            document.getElementById('modal-success').classList.remove('hidden');
            document.getElementById('final-time').textContent = formatTime(timer);
            document.getElementById('final-mistakes').textContent = mistakes;
            document.getElementById('final-score').textContent = score;
        }

        document.addEventListener('keydown', (e) => {
            if (e.key >= '1' && e.key <= '9') inputNumber(parseInt(e.key));
            if (e.key === 'Backspace' || e.key === '0') {
                 if (selectedCell[0] !== null && INITIAL_GRID[selectedCell[0]][selectedCell[1]] === 0) {
                     grid[selectedCell[0]][selectedCell[1]] = 0; renderBoard();
                 }
            }
        });

        window.onload = init;
    </script>
</body>
</html>
